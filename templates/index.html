<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Assistant PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <header class="bg-white shadow-sm py-4">
        <div class="max-w-5xl mx-auto px-4 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-blue-600">AI Email Assistant <span class="text-gray-400 text-sm font-normal border ml-2 px-2 py-1 rounded">Corporate Edition</span></h1>
            <p class="text-sm text-gray-500">Powered by Llama-3.1 & ML</p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="bg-white p-6 rounded-lg shadow-md border border-gray-100">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Paste Email Content Here</label>
            <textarea id="emailInput" rows="12" class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Dear Team, I am writing to follow up on..."></textarea>
            
            <button id="summarizeBtn" onclick="processEmail()" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition duration-200 flex items-center justify-center">
                <span>Analyze & Draft Reply</span>
            </button>
            <p id="loadingMsg" class="text-sm text-blue-500 mt-2 hidden font-medium">⏳ AI & ML are processing your email... please wait.</p>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md border border-gray-100 flex flex-col space-y-6">
            
            <div id="fraudAlertBanner" class="hidden p-4 rounded border font-medium text-sm"></div>

            <div>
                <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2 border-b pb-1">🤖 Key Takeaways (Summary)</h2>
                <div id="summaryOutput" class="text-gray-700 whitespace-pre-line text-sm bg-gray-50 p-3 rounded border">
                    Summary will appear here...
                </div>
            </div>

            <div>
                <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2 border-b pb-1">✍️ Suggested Reply Draft</h2>
                <div id="replyOutput" class="text-gray-700 whitespace-pre-line text-sm bg-blue-50 p-3 rounded border border-blue-100 min-h-[150px]">
                    Reply draft will appear here...
                </div>
            </div>

        </div>
    </main>

    <script>
        async function processEmail() {
            const emailText = document.getElementById('emailInput').value;
            const btn = document.getElementById('summarizeBtn');
            const loading = document.getElementById('loadingMsg');
            const summaryBox = document.getElementById('summaryOutput');
            const replyBox = document.getElementById('replyOutput');
            const fraudBanner = document.getElementById('fraudAlertBanner');

            if(!emailText.trim()) {
                alert("Please paste an email first!");
                return;
            }

            // UI updating (Loading state)
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            loading.classList.remove('hidden');
            fraudBanner.classList.add('hidden');
            summaryBox.innerHTML = "Generating...";
            replyBox.innerHTML = "Drafting...";

            try {
                // Backend ko data bhejna
                const response = await fetch('/api/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email_text: emailText })
                });

                const data = await response.json();

                if(response.ok) {
                    summaryBox.innerHTML = data.summary;
                    
                    // SECURITY LOGIC: Agar ML ne kaha fraud hai, toh reply lock kar do!
                    if (data.fraud_analysis.is_fraud) {
                        fraudBanner.className = "p-4 rounded border font-medium text-sm bg-red-50 border-red-200 text-red-700 block";
                        fraudBanner.innerHTML = `🚨 SECURITY ALERT: This email has been flagged as ${data.fraud_analysis.category} with ${data.fraud_analysis.confidence_score}% certainty.`;
                        
                        replyBox.className = "text-red-700 font-semibold whitespace-pre-line text-sm bg-red-100 p-3 rounded border border-red-300 min-h-[150px]";
                        replyBox.innerHTML = "🔒 REPLY DISABLED FOR SAFETY: This is a verified fraud email. Corporate guidelines strictly prohibit responding to phishing or scam content to protect corporate network security.";
                    } else {
                        // Normal Safe email
                        fraudBanner.className = "p-4 rounded border font-medium text-sm bg-green-50 border-green-200 text-green-700 block";
                        fraudBanner.innerHTML = "✅ ML Scan: No security threats detected. This email is safe.";
                        
                        replyBox.className = "text-gray-700 whitespace-pre-line text-sm bg-blue-50 p-3 rounded border border-blue-100 min-h-[150px]";
                        replyBox.innerHTML = data.reply;
                    }

                } else {
                    summaryBox.innerHTML = `<span class="text-red-500">Error: ${data.error}</span>`;
                    replyBox.innerHTML = "Failed to generate response.";
                }
            } catch (error) {
                summaryBox.innerHTML = `<span class="text-red-500">Connection Error! Backend chalu hai?</span>`;
            }

            // Reset UI
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            loading.classList.add('hidden');
        }
    </script>
</body>
</html>
